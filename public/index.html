<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Reminder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <h1>Birthday reminders</h1>
        <p>
          Add your details and we'll send you a little something on your
          birthday every year.
        </p>
      </div>

      <div class="alert" id="alert">
        <span id="alertIcon"></span>
        <span id="alertMsg"></span>
      </div>

      <form id="form" novalidate>
        <div class="field">
          <label for="username">Your name</label>
          <input
            type="text"
            id="username"
            placeholder="Jane Doe"
            autocomplete="name"
          />
          <span class="field-err" id="usernameErr">
            What should we call you?
          </span>
        </div>

        <div class="field">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            placeholder="jane@example.com"
            autocomplete="email"
          />
          <span class="field-err" id="emailErr">
            That doesn't look like a valid email
          </span>
        </div>

        <div class="field">
          <label for="dob">Date of birth</label>
          <input type="date" id="dob" />
          <span class="field-err" id="dobErr">
            We need your birthday to send you wishes
          </span>
          <span class="hint">
            We only use this to know when to celebrate you
          </span>
        </div>

        <div class="divider"></div>

        <div class="submit-row">
          <button type="submit" class="submit-btn" id="submitBtn">
            Add me
          </button>
          <span class="submit-note">One email, once a year. That's it.</span>
        </div>
      </form>
    </div>

    <script src="app.js"></script>
  </body>
</html>
